<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>勤怠打刻</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #0f1626; color: #fff; font-family: sans-serif; overflow: hidden; }
  #wrap { display: flex; flex-direction: column; height: 100%; }

  header {
    padding: 10px; text-align: center; background: #1a2a4a;
    position: relative;
  }
  #clock { font-size: 2rem; font-weight: bold; letter-spacing: 2px; }
  #subtitle { font-size: 1rem; opacity: .85; }
  #kyotenLabel {
    position: absolute; right: 10px; top: 10px;
    font-size: .8rem; color: #9ab; background: rgba(0,0,0,.3);
    padding: 4px 8px; border-radius: 6px; cursor: pointer;
  }

  #camArea { position: relative; flex: 1; overflow: hidden; background: #000; }
  /* html5-qrcodeが生成するvideoを全面表示 */
  #reader { width: 100%; height: 100%; }
  #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }
  #reader img[alt="Info icon"], #reader__dashboard { display: none !important; }

  #guide {
    position: absolute; bottom: 14px; width: 100%; text-align: center;
    font-size: 1.1rem; text-shadow: 0 1px 4px #000; pointer-events: none;
  }

  /* 起動オーバーレイ */
  #startOverlay {
    position: absolute; inset: 0; z-index: 5;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; background: #16213e; padding: 24px; text-align: center;
  }
  #startBtn {
    font-size: 1.8rem; font-weight: bold; padding: 26px 44px;
    border: none; border-radius: 16px; background: #2e7d32; color: #fff; cursor: pointer;
  }
  #startNote { color: #9ab; font-size: 1rem; line-height: 1.6; }

  /* 結果バナー（上部。カメラを隠さず、スキャンを止めない） */
  #result {
    position: fixed; top: 0; left: 0; right: 0; z-index: 20; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; text-align: center; padding: 24px 16px;
    pointer-events: none;
  }
  #result.ok   { background: rgba(10,122,60,.96);  display: flex; }
  #result.ng   { background: rgba(163,36,44,.96);  display: flex; }
  #result.wait { background: rgba(30,64,120,.96);  display: flex; }
  #resultType { font-size: 3rem; font-weight: bold; }
  #resultName { font-size: 1.8rem; }
  #resultMsg  { font-size: 1.2rem; opacity: .9; }

  #status { padding: 7px; text-align: center; font-size: .9rem; color: #aaa; background: #000; }

  /* 設定ダイアログ */
  #settings {
    position: fixed; inset: 0; z-index: 30; display: none;
    align-items: center; justify-content: center; background: rgba(0,0,0,.7); padding: 24px;
  }
  #settings.show { display: flex; }
  #settingsBox {
    background: #1a2540; border-radius: 12px; padding: 24px; width: min(92vw, 420px);
    display: flex; flex-direction: column; gap: 14px;
  }
  #settingsBox h2 { font-size: 1.2rem; }
  #settingsBox label { font-size: .9rem; color: #9ab; }
  #settingsBox input {
    font-size: 1.1rem; padding: 12px; border-radius: 8px; border: 1px solid #456;
    background: #0f1626; color: #fff;
  }
  #settingsBox .row { display: flex; gap: 10px; justify-content: flex-end; }
  #settingsBox button {
    font-size: 1rem; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;
  }
  #saveBtn { background: #2e7d32; color: #fff; }
  #cancelBtn { background: #444; color: #fff; }
</style>
</head>
<body>
<div id="wrap">
  <header>
    <div id="clock">--:--:--</div>
    <div id="subtitle">QRコードをかざしてください</div>
    <div id="kyotenLabel">拠点: 未設定 ⚙</div>
  </header>
  <div id="camArea">
    <div id="reader"></div>
    <div id="guide"></div>
    <div id="startOverlay">
      <button id="startBtn">タップして打刻を開始</button>
      <div id="startNote">カメラを使用します。<br>許可を求められたら「許可」を押してください。</div>
    </div>
  </div>
  <div id="status">待機中</div>
</div>

<div id="result">
  <div id="resultType"></div>
  <div id="resultName"></div>
  <div id="resultMsg"></div>
</div>

<div id="settings">
  <div id="settingsBox">
    <h2>拠点設定</h2>
    <label>この端末を設置する拠点IDを入力してください（出勤場所・退勤場所として記録されます）</label>
    <input id="kyotenInput" type="text" placeholder="例: 12ed8562" autocomplete="off">
    <div class="row">
      <button id="cancelBtn">キャンセル</button>
      <button id="saveBtn">保存</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
// ===== 設定 =====
// 打刻API（Google Apps Script WebアプリのURL）
const EXEC_URL = 'https://script.google.com/macros/s/AKfycbwNKAfalCU06mubkn3aap1LnoyimYNFdOBM8adK4onD-7WW6Tidqbxceai8aQBpCHgmRQ/exec';
// アクセスキー（URLの ?key= から取得。HTMLには秘密情報を埋め込まない）
const KIOSK_KEY = new URLSearchParams(location.search).get('key') || '';
// 拠点ID: URLの ?kyoten= が最優先、無ければ端末に保存した値を使う
const urlKyoten = new URLSearchParams(location.search).get('kyoten');
let KYOTEN_ID = urlKyoten || localStorage.getItem('kyotenId') || '';

const COOLDOWN_MS = 3000;      // 連続読み取り防止
const RESULT_SHOW_MS = 2500;   // 結果表示時間

const status_ = document.getElementById('status');
const guide   = document.getElementById('guide');
const result  = document.getElementById('result');
const overlay = document.getElementById('startOverlay');
const kyotenLabel = document.getElementById('kyotenLabel');

let html5Qr = null;
let busy = false;
let lastCode = '';
let lastCodeAt = 0;

// 時計
setInterval(() => {
  const d = new Date();
  document.getElementById('clock').textContent =
    [d.getHours(), d.getMinutes(), d.getSeconds()].map(n => String(n).padStart(2, '0')).join(':');
}, 250);

function refreshKyotenLabel() {
  kyotenLabel.textContent = '拠点: ' + (KYOTEN_ID || '未設定') + ' ⚙';
}
refreshKyotenLabel();

// ===== 拠点設定ダイアログ =====
const settings = document.getElementById('settings');
const kyotenInput = document.getElementById('kyotenInput');
kyotenLabel.addEventListener('click', () => {
  kyotenInput.value = KYOTEN_ID;
  settings.classList.add('show');
});
document.getElementById('cancelBtn').addEventListener('click', () => settings.classList.remove('show'));
document.getElementById('saveBtn').addEventListener('click', () => {
  KYOTEN_ID = kyotenInput.value.trim();
  localStorage.setItem('kyotenId', KYOTEN_ID);
  refreshKyotenLabel();
  settings.classList.remove('show');
});

if (!KIOSK_KEY) {
  document.getElementById('startNote').textContent =
    'URLにアクセスキーがありません。管理者から案内された ?key= 付きのURLで開いてください。';
}

// ===== カメラ起動＆連続スキャン =====
document.getElementById('startBtn').addEventListener('click', startScan);

async function startScan() {
  if (typeof Html5Qrcode === 'undefined') {
    status_.textContent = 'QRライブラリを読み込めませんでした（通信環境をご確認ください）';
    return;
  }
  status_.textContent = 'カメラ起動中…';
  html5Qr = new Html5Qrcode('reader', { verbose: false });
  const config = {
    fps: 12,
    qrbox: (w, h) => { const m = Math.floor(Math.min(w, h) * 0.7); return { width: m, height: m }; },
    aspectRatio: window.innerWidth / (window.innerHeight - 120),
  };
  try {
    await html5Qr.start({ facingMode: 'environment' }, config, onScanSuccess, () => {});
    overlay.style.display = 'none';
    status_.textContent = 'スキャン待機中';
    guide.textContent = '';
  } catch (e) {
    status_.textContent = 'カメラ起動失敗: ' + (e && e.name ? e.name : e);
    document.getElementById('startNote').textContent =
      'カメラを起動できません（' + (e && e.name ? e.name : e) + '）。ブラウザのサイト設定でカメラを「許可」にして、もう一度お試しください。';
  }
}

// 同じQRを直近に読んだかの判定用（コード→最終読み取り時刻）
const recentCodes = new Map();
let hideTimer = null;

function onScanSuccess(decodedText) {
  const now = Date.now();
  // 同一コードのクールダウン（別の人のQRは待たされずすぐ処理される）
  const last = recentCodes.get(decodedText) || 0;
  if (now - last < COOLDOWN_MS) return;
  recentCodes.set(decodedText, now);
  // 古い履歴を掃除
  for (const [k, t] of recentCodes) if (now - t > 60000) recentCodes.delete(k);

  // 読み取った瞬間に受付フィードバック（サーバー応答を待たない）
  beep(true);
  if (navigator.vibrate) navigator.vibrate(80);
  showBanner('wait', '受付', '', '送信中…');

  // 送信はバックグラウンド。スキャンは止めないので次の人がすぐかざせる
  fetch(EXEC_URL, {
    method: 'POST',
    body: JSON.stringify({ employeeId: decodedText, kyotenId: KYOTEN_ID, key: KIOSK_KEY })
  })
    .then(res => res.json())
    .then(showResult)
    .catch(err => showResult({ ok: false, message: '通信エラー: ' + err.message }));
}

function showResult(res) {
  if (res.ok) {
    if (navigator.vibrate) navigator.vibrate(200);
    showBanner('ok', res.type, res.name + ' さん', res.time + ' ' + res.message);
  } else {
    beep(false);
    if (navigator.vibrate) navigator.vibrate([100, 80, 100]);
    showBanner('ng', 'エラー', '', res.message);
  }
}

function showBanner(kind, type, name, msg) {
  result.className = kind;
  document.getElementById('resultType').textContent = type;
  document.getElementById('resultName').textContent = name;
  document.getElementById('resultMsg').textContent = msg;
  if (hideTimer) clearTimeout(hideTimer);
  // 「受付(送信中)」は結果が来るまで残す。確定結果(ok/ng)は一定時間で消す
  if (kind !== 'wait') {
    hideTimer = setTimeout(() => {
      result.className = '';
      result.style.display = 'none';
    }, RESULT_SHOW_MS);
  }
}

// 成功/失敗音（外部ファイル不要）
function beep(ok) {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.value = ok ? 880 : 220;
    g.gain.setValueAtTime(0.3, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
    o.start(); o.stop(ac.currentTime + 0.4);
  } catch (e) { /* 音は必須ではない */ }
}
</script>
</body>
</html>
