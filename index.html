<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>勤怠打刻</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #0f1626; color: #fff; font-family: sans-serif; overflow: hidden; }
  #wrap { display: flex; flex-direction: column; height: 100%; }

  header {
    padding: 10px; text-align: center; background: #1a2a4a;
    position: relative;
  }
  #clock { font-size: 2rem; font-weight: bold; letter-spacing: 2px; }
  #orgTitle { font-size: 1.25rem; font-weight: bold; margin-top: 2px; }
  #companyName { opacity: .9; }
  #kyotenNameLabel { color: #7be08a; }
  #gear { cursor: pointer; font-size: 1rem; margin-left: 8px; opacity: .8; }
  #subtitle { font-size: 1rem; opacity: .85; margin-top: 2px; }

  #camArea { position: relative; flex: 1; overflow: hidden; background: #000; }
  /* html5-qrcodeが生成するvideoを全面表示 */
  #reader { width: 100%; height: 100%; }
  #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }
  #reader img[alt="Info icon"], #reader__dashboard { display: none !important; }

  #guide {
    position: absolute; bottom: 14px; width: 100%; text-align: center;
    font-size: 1.1rem; text-shadow: 0 1px 4px #000; pointer-events: none;
  }

  /* 出勤/退勤モードボタン */
  #modeBar { display: flex; gap: 8px; padding: 8px; background: #0b1220; }
  .modeBtn {
    flex: 1; font-size: 1.6rem; font-weight: bold; padding: 20px 0;
    border: 3px solid #33415c; border-radius: 12px;
    background: #1a2540; color: #8ea3c4; cursor: pointer; transition: .12s;
  }
  #modeIn.active  { background: #2e7d32; color: #fff; border-color: #7be08a; box-shadow: 0 0 0 3px rgba(123,224,138,.35); }
  #modeOut.active { background: #1e5aa8; color: #fff; border-color: #7fb3ff; box-shadow: 0 0 0 3px rgba(127,179,255,.35); }

  /* 起動オーバーレイ */
  #startOverlay {
    position: absolute; inset: 0; z-index: 5;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; background: #16213e; padding: 24px; text-align: center;
  }
  #startBtn {
    font-size: 1.8rem; font-weight: bold; padding: 26px 44px;
    border: none; border-radius: 16px; background: #2e7d32; color: #fff; cursor: pointer;
  }
  #startNote { color: #9ab; font-size: 1rem; line-height: 1.6; }

  /* 結果オーバーレイ（全画面。スキャンした瞬間に画面全体が切り替わる） */
  #result {
    position: fixed; inset: 0; z-index: 20; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; text-align: center; padding: 24px;
    pointer-events: none;
  }
  #result.ok   { background: #0a7a3c; display: flex; }
  #result.ng   { background: #a3242c; display: flex; }
  #result.wait { background: #1e4078; display: flex; }
  #resultIcon { font-size: 5.5rem; line-height: 1; }
  #resultType { font-size: 1.8rem; font-weight: bold; letter-spacing: 1px; }
  #resultName { font-size: 2.6rem; font-weight: bold; line-height: 1.35; }
  #resultMsg  { font-size: 1.3rem; opacity: .9; }
  /* 送信中はアイコンを点滅させて「処理中」を伝える */
  #result.wait #resultIcon { animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

  #status { padding: 7px; text-align: center; font-size: .9rem; color: #aaa; background: #000; }

  /* バージョン表示（最新版かの確認用） */
  #ver {
    position: fixed; right: 6px; bottom: 3px; z-index: 40;
    font-size: .7rem; color: #6b7a90; pointer-events: none;
  }

  /* 設定ダイアログ */
  #settings {
    position: fixed; inset: 0; z-index: 30; display: none;
    align-items: center; justify-content: center; background: rgba(0,0,0,.7); padding: 24px;
  }
  #settings.show { display: flex; }
  #settingsBox {
    background: #1a2540; border-radius: 12px; padding: 24px; width: min(92vw, 420px);
    display: flex; flex-direction: column; gap: 14px;
  }
  #settingsBox h2 { font-size: 1.2rem; }
  #settingsBox label { font-size: .9rem; color: #9ab; }
  #settingsBox input, #settingsBox select {
    font-size: 1.2rem; padding: 12px; border-radius: 8px; border: 1px solid #456;
    background: #0f1626; color: #fff; width: 100%;
  }
  #settingsBox .row { display: flex; gap: 10px; justify-content: flex-end; }
  #settingsBox button {
    font-size: 1rem; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;
  }
  #saveBtn { background: #2e7d32; color: #fff; }
  #cancelBtn { background: #444; color: #fff; }
</style>
</head>
<body>
<div id="wrap">
  <header>
    <div id="clock">--:--:--</div>
    <div id="orgTitle"><span id="companyName">杉原サポート株式会社</span> <span id="kyotenNameLabel">拠点未設定</span><span id="gear" title="拠点を変更">⚙</span></div>
    <div id="subtitle">出勤 / 退勤 を選んでください</div>
  </header>
  <div id="camArea">
    <div id="reader"></div>
    <div id="guide"></div>
    <div id="startOverlay">
      <button id="startBtn">タップして打刻を開始</button>
      <div id="startNote">カメラを使用します。<br>許可を求められたら「許可」を押してください。</div>
    </div>
  </div>
  <div id="modeBar">
    <button id="modeIn" class="modeBtn">▶ 出勤</button>
    <button id="modeOut" class="modeBtn">✅ 退勤</button>
  </div>
  <div id="status">待機中</div>
</div>
<div id="ver"></div>

<div id="result">
  <div id="resultIcon"></div>
  <div id="resultType"></div>
  <div id="resultName"></div>
  <div id="resultMsg"></div>
</div>

<div id="settings">
  <div id="settingsBox">
    <h2>拠点の選択</h2>
    <label>この端末を設置する拠点を選んでください（出勤場所・退勤場所として記録されます）</label>
    <select id="kyotenSelect"><option value="">読み込み中…</option></select>
    <div class="row">
      <button id="cancelBtn">キャンセル</button>
      <button id="saveBtn">保存</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
// ===== 設定 =====
// 画面（フロント）のバージョン。更新のたびに上げる。タブレットが最新版かの確認用
const FRONT_VER = 'v20';
// 打刻API（Google Apps Script WebアプリのURL）
const EXEC_URL = 'https://script.google.com/macros/s/AKfycbwNKAfalCU06mubkn3aap1LnoyimYNFdOBM8adK4onD-7WW6Tidqbxceai8aQBpCHgmRQ/exec';
// アクセスキー（URLの ?key= から取得。HTMLには秘密情報を埋め込まない）
const KIOSK_KEY = new URLSearchParams(location.search).get('key') || '';
// 拠点: 端末に保存した値を使う（初回は拠点マスタから選択）
let KYOTEN_ID = localStorage.getItem('kyotenId') || '';
let KYOTEN_NAME = localStorage.getItem('kyotenName') || '';

const COOLDOWN_MS = 6000;      // 同一QRの連続読み取り防止（前で立ち止まっても再打刻しない）
const RESULT_SHOW_MS = 2500;   // 結果表示時間

const status_ = document.getElementById('status');
const guide   = document.getElementById('guide');
const result  = document.getElementById('result');
const overlay = document.getElementById('startOverlay');
const gear = document.getElementById('gear');
const kyotenNameLabel = document.getElementById('kyotenNameLabel');
const companyName = document.getElementById('companyName');
const subtitle = document.getElementById('subtitle');
const verEl = document.getElementById('ver');
verEl.textContent = '画面 ' + FRONT_VER;

let html5Qr = null;
let currentMode = '';   // 'in'(出勤) or 'out'(退勤)。選択必須。通信は文字化け回避のためASCII
const MODE_LABEL = { in: '出勤', out: '退勤' };

// ===== 出勤/退勤モード選択 =====
const modeIn = document.getElementById('modeIn');
const modeOut = document.getElementById('modeOut');
function setMode(m) {
  currentMode = m;
  modeIn.classList.toggle('active', m === 'in');
  modeOut.classList.toggle('active', m === 'out');
  subtitle.textContent = m ? (MODE_LABEL[m] + 'モード：QRをかざしてください') : '出勤 / 退勤 を選んでください';
}
modeIn.addEventListener('click', () => setMode('in'));
modeOut.addEventListener('click', () => setMode('out'));
setMode(''); // 初期は未選択（選択を促す）

// 時計
setInterval(() => {
  const d = new Date();
  document.getElementById('clock').textContent =
    [d.getHours(), d.getMinutes(), d.getSeconds()].map(n => String(n).padStart(2, '0')).join(':');
}, 250);

function refreshOrgTitle() {
  kyotenNameLabel.textContent = KYOTEN_NAME || '拠点未設定';
}
refreshOrgTitle();

// ===== 拠点選択ダイアログ =====
const settings = document.getElementById('settings');
const kyotenSelect = document.getElementById('kyotenSelect');

// 拠点マスタから一覧を取得してプルダウンに反映
function loadKyotenList() {
  fetch(EXEC_URL, { method: 'POST', body: JSON.stringify({ action: 'kyotenList', key: KIOSK_KEY }) })
    .then(res => res.json())
    .then(data => {
      if (data.v) verEl.textContent = '画面 ' + FRONT_VER + ' / API v' + data.v;
      if (data.company) companyName.textContent = data.company;
      const list = data.list || [];
      kyotenSelect.innerHTML = '<option value="">選択してください</option>' +
        list.map(k => '<option value="' + k.id + '" data-name="' + k.name + '"' +
          (k.id === KYOTEN_ID ? ' selected' : '') + '>' + k.name + '</option>').join('');
      // 保存済みIDの拠点名を最新化
      const cur = list.find(k => k.id === KYOTEN_ID);
      if (cur) { KYOTEN_NAME = cur.name; localStorage.setItem('kyotenName', cur.name); refreshOrgTitle(); }
      // 未設定なら選択を促す
      if (!KYOTEN_ID) settings.classList.add('show');
    })
    .catch(() => { kyotenSelect.innerHTML = '<option value="">取得失敗（通信をご確認ください）</option>'; });
}

gear.addEventListener('click', () => settings.classList.add('show'));
document.getElementById('cancelBtn').addEventListener('click', () => {
  if (KYOTEN_ID) settings.classList.remove('show'); // 未設定のうちは閉じさせない
});
document.getElementById('saveBtn').addEventListener('click', () => {
  const opt = kyotenSelect.options[kyotenSelect.selectedIndex];
  if (!opt || !opt.value) { alert('拠点を選択してください'); return; }
  KYOTEN_ID = opt.value;
  KYOTEN_NAME = opt.getAttribute('data-name') || '';
  localStorage.setItem('kyotenId', KYOTEN_ID);
  localStorage.setItem('kyotenName', KYOTEN_NAME);
  refreshOrgTitle();
  settings.classList.remove('show');
});

if (!KIOSK_KEY) {
  document.getElementById('startNote').textContent =
    'URLにアクセスキーがありません。管理者から案内された ?key= 付きのURLで開いてください。';
}
loadKyotenList();

// ===== カメラ起動＆連続スキャン =====
document.getElementById('startBtn').addEventListener('click', startScan);

async function startScan() {
  if (!KYOTEN_ID) { settings.classList.add('show'); return; }
  if (typeof Html5Qrcode === 'undefined') {
    status_.textContent = 'QRライブラリを読み込めませんでした（通信環境をご確認ください）';
    return;
  }
  status_.textContent = 'カメラ起動中…';
  html5Qr = new Html5Qrcode('reader', { verbose: false });
  const config = {
    fps: 12,
    qrbox: (w, h) => { const m = Math.floor(Math.min(w, h) * 0.7); return { width: m, height: m }; },
    aspectRatio: window.innerWidth / (window.innerHeight - 120),
  };
  try {
    await html5Qr.start({ facingMode: 'environment' }, config, onScanSuccess, () => {});
    overlay.style.display = 'none';
    status_.textContent = 'スキャン待機中';
    guide.textContent = '';
  } catch (e) {
    status_.textContent = 'カメラ起動失敗: ' + (e && e.name ? e.name : e);
    document.getElementById('startNote').textContent =
      'カメラを起動できません（' + (e && e.name ? e.name : e) + '）。ブラウザのサイト設定でカメラを「許可」にして、もう一度お試しください。';
  }
}

// 同じQRを直近に読んだかの判定用（コード→最終読み取り時刻）
const recentCodes = new Map();
let hideTimer = null;

let noModeWarnedAt = 0;

function onScanSuccess(decodedText) {
  const now = Date.now();

  // モード未選択なら打刻せず注意を促す
  if (!currentMode) {
    if (now - noModeWarnedAt > 2000) {
      noModeWarnedAt = now;
      beep(false);
      showBanner('ng', '👆', 'まず「出勤」か「退勤」を選んでください', '', '');
    }
    return;
  }

  // 同一コード×同一モードのクールダウン。
  // モードが違えば（出勤→退勤）別の打刻なので、同じQRでもすぐ処理する
  const dedupKey = decodedText + '|' + currentMode;
  const last = recentCodes.get(dedupKey) || 0;
  if (now - last < COOLDOWN_MS) return;
  recentCodes.set(dedupKey, now);
  // 古い履歴を掃除
  for (const [k, t] of recentCodes) if (now - t > 60000) recentCodes.delete(k);

  // 読み取った瞬間に受付フィードバック（サーバー応答を待たない）
  beep(true);
  if (navigator.vibrate) navigator.vibrate(80);
  showBanner('wait', '⏳', MODE_LABEL[currentMode] + ' 受付しました', MODE_LABEL[currentMode], '送信中…');

  // 送信はバックグラウンド。スキャンは止めないので次の人がすぐかざせる
  fetch(EXEC_URL, {
    method: 'POST',
    body: JSON.stringify({ employeeId: decodedText, kyotenId: KYOTEN_ID, type: currentMode, key: KIOSK_KEY })
  })
    .then(res => res.json())
    .then(showResult)
    .catch(err => showResult({ success: false, message: '通信エラー: ' + err.message }));
}

function showResult(res) {
  if (res.success) {
    // 出勤=おはよう / 退勤=お疲れ様。どちらも「登録しました」を明示
    if (navigator.vibrate) navigator.vibrate(200);
    const icon = res.type === '出勤' ? '▶' : '✅';
    const greet = res.type === '出勤' ? 'おはようございます！' : 'お疲れ様でした！';
    showBanner('ok', icon,
      (res.employeeName || '') + ' さん',                       // 大：氏名
      '✔ ' + res.type + ' を登録しました',                       // 見出し：登録できた
      greet + '　' + (res.time || ''),                          // 補足：あいさつ＋時刻
      RESULT_SHOW_MS);
  } else {
    // 登録できなかった（理由を表示、少し長めに）
    beep(false);
    if (navigator.vibrate) navigator.vibrate([100, 80, 100]);
    showBanner('ng', '✖',
      '登録できませんでした',                                    // 大：はっきり失敗
      '',
      res.message || 'エラーが発生しました',                     // 補足：理由
      4000);
  }
}

// kind: ok/ng/wait, icon: 絵文字, big: 中央の大きな文字, type: 見出しラベル, msg: 補足, dur: 表示ms
function showBanner(kind, icon, big, type, msg, dur) {
  // 表示/非表示はクラスで制御する（インラインdisplayは付けない。
  //  付けると2回目以降クラスのdisplay:flexを上書きして出なくなる）
  result.className = kind;
  document.getElementById('resultIcon').textContent = icon;
  document.getElementById('resultType').textContent = type;
  document.getElementById('resultName').textContent = big;
  document.getElementById('resultMsg').textContent = msg;
  if (hideTimer) clearTimeout(hideTimer);
  // 「受付(送信中)」は結果が来るまで残す。確定結果(ok/ng)は一定時間で消す
  if (kind !== 'wait') {
    hideTimer = setTimeout(() => { result.className = ''; }, dur || RESULT_SHOW_MS);
  }
}

// 成功/失敗音（外部ファイル不要）
function beep(ok) {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.value = ok ? 880 : 220;
    g.gain.setValueAtTime(0.3, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
    o.start(); o.stop(ac.currentTime + 0.4);
  } catch (e) { /* 音は必須ではない */ }
}
</script>
</body>
</html>
